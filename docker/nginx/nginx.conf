server {
    listen 80;
    client_max_body_size 50M;      # document uploads (Milestone 2)

    # SPA: serve static files; unknown paths fall back to index.html
    location / {
        root /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    # API: proxy to the backend container
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Request-ID $request_id;
        proxy_buffering off;        # required for SSE streaming (Milestone 4)
        proxy_read_timeout 300s;
    }
}
